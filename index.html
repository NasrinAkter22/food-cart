<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Menu Sidebar System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .sidebar-transition {
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>

<body class="bg-[#0f172a] text-white min-h-screen">

  <header id="main-header" class="max-w-7xl mx-auto flex justify-between items-center p-6 md:px-16 sticky top-0 bg-[#0f172a]/80 backdrop-blur-md
    z-40">
    <h1 class="text-3xl font-bold italic">Our Delicious <span class="text-orange-500">Food Menu</span></h1>
    <div class="relative cursor-pointer group" onclick="toggleSidebar()">
      <div class=" p-3 rounded-full group-hover:bg-[#2d3a4f] transition">
        <i class="fas fa-shopping-cart text-xl"></i>
      </div>
      <span id="cart-count"
        class="absolute -top-2 -right-2 bg-orange-600 text-[11px] font-bold w-6 h-6 flex items-center justify-center rounded-full border-2 border-[#0f172a]">0</span>
    </div>
  </header>
  <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 hidden z-40" onclick="toggleSidebar()"></div>

  <div id="sidebar"
    class="fixed top-0 right-0 h-full w-80 sm:w-1/2 xl:w-1/4 bg-[#161b22] shadow-2xl z-50 transform translate-x-full sidebar-transition border-l border-gray-800 flex flex-col">
    <div class="p-6 border-b border-gray-800 flex justify-between items-center">
      <h2 class="text-2xl font-bold tracking-tight">My <span class="text-orange-500">Cart</span></h2>
      <button onclick="toggleSidebar()" class="text-gray-400 hover:text-white transition">
        <i class="fas fa-times text-2xl"></i>
      </button>
    </div>

    <div class="p-6 flex flex-col h-full">
      <div id="sidebar-cart-list" class="flex-grow overflow-y-auto space-y-4 pr-2">
        <div class="flex justify-between items-center bg-[#0f172a] p-3 rounded-md border border-gray-800">
          <div class="flex gap-3">
            <div class="text-3xl sm:text-5xl">🍕</div>
            <h3 class="text-lg sm:text-xl font-medium">item.name</h3>
          </div>
          <div class="flex flex-col items-center gap-1">
            <div class="">
              <div class="flex items-center rounded-2xl border border-gray-200">
                <button type="button" class="size-6 text-white transition hover:opacity-75">
                  −
                </button>

                <input type="number" id="Quantity" value="1" min="0"
                  class="h-10 w-16 sm:h-6 sm:w-12 border-transparent bg-transparent font-semibold text-center text-white">

                <button type="button" class="size-6 text-white transition hover:opacity-75">
                  +
                </button>
              </div>
            </div>
            <span class="text-orange-500 font-bold">$5.00</span>            
          </div>
        </div>
      </div>



      <div class="border-t border-gray-800 pt-6 mt-4">
        <div class="flex justify-between items-center mb-6">
          <span class="text-gray-400 font-medium text-lg">Total Amount:</span>
          <span id="total-price" class="text-2xl font-bold text-orange-500">$0.00</span>
        </div>
        <button onclick="openCheckout()"
          class="w-full bg-orange-600 hover:bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg shadow-orange-900/20 transition-all active:scale-95">
          Proceed to Checkout
        </button>
      </div>
    </div>
  </div>

  <main id="menu-page" class="p-6 md:px-16 max-w-7xl mx-auto">
    <p class="text-gray-400 text-lg mb-10">Pick your favorite delicious items.</p>
    <div id="food-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
    </div>
  </main>

  <section id="checkout-page" class="hidden fixed inset-0 z-[60] bg-[#0f172a] overflow-y-auto py-12 px-6">
    <div class="max-w-md mx-auto bg-[#1e293b] p-8 rounded-[2rem] border border-gray-700 shadow-2xl">
      <h2 class="text-3xl font-extrabold text-orange-500 mb-8 text-center">Delivery Details</h2>
      <form id="final-order-form" class="space-y-5">
        <div class="space-y-1">
          <label class="text-sm text-gray-400 ml-1">Full Name</label>
          <input type="text" required
            class="w-full bg-[#0f172a] border border-gray-600 p-4 rounded-2xl focus:border-orange-500 outline-none transition">
        </div>
        <div class="space-y-1">
          <label class="text-sm text-gray-400 ml-1">Password</label>
          <input type="password" required
            class="w-full bg-[#0f172a] border border-gray-600 p-4 rounded-2xl focus:border-orange-500 outline-none transition">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div class="space-y-1">
            <label class="text-sm text-gray-400 ml-1">Phone</label>
            <input type="tel" required
              class="w-full bg-[#0f172a] border border-gray-600 p-4 rounded-2xl focus:border-orange-500 outline-none transition">
          </div>
          <div class="space-y-1">
            <label class="text-sm text-gray-400 ml-1">City</label>
            <input type="text" required
              class="w-full bg-[#0f172a] border border-gray-600 p-4 rounded-2xl focus:border-orange-500 outline-none transition">
          </div>
        </div>

        <div class="p-4 bg-[#0f172a] rounded-2xl border border-gray-700">
          <p class="text-sm font-bold text-gray-400 mb-3">Payment Method</p>
          <div class="space-y-2">
            <label class="flex items-center gap-3 cursor-pointer group">
              <input type="radio" name="pay" value="COD" checked class="w-5 h-5 accent-orange-500">
              <span class="group-hover:text-orange-400 transition">Cash On Delivery</span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer group">
              <input type="radio" name="pay" value="Online" class="w-5 h-5 accent-orange-500">
              <span class="group-hover:text-orange-400 transition">Online Payment</span>
            </label>
          </div>
        </div>

        <button type="submit"
          class="w-full bg-orange-600 py-4 rounded-2xl font-black text-xl hover:bg-orange-500 transition shadow-lg shadow-orange-900/40">Confirm
          Order</button>
        <button type="button" onclick="closeCheckout()"
          class="w-full text-gray-500 font-bold hover:text-white transition mt-2">Go Back to Menu</button>
      </form>
    </div>
  </section>

  <script src="app.js"></script>
</body>

</html>
